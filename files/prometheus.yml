global:
  external_labels:
    monitor: "node"
  scrape_interval: 10s
scrape_configs:
  - job_name: "blackbox"
    metrics_path: "/probe"
    params:
      module: ["http_2xx"]
    static_configs:
      - targets:
          - "https://google.com"
    relabel_configs:
      - source_labels: ["__address__"]
        target_label: "__param_target"
      - source_labels: ["__param_target"]
        target_label: "instance"
      - target_label: "__address__"
        replacement: "10.0.3.2:9115"

  - job_name: "blackbox_exporter"
    static_configs:
      - targets: ["10.0.3.2:9115"]

  - job_name: "dnsexp_google_a"
    scrape_interval: "10s"
    metrics_path: "/query"
    params:
      module:
        - "google_a"
    relabel_configs:
      - source_labels: ["__address__"]
        target_label: "__param_query_name"
      - source_labels: ["__address__"]
        target_label: "instance"
      - target_label: "__address__"
        replacement: "10.0.3.2:15353"
      - target_label: "monitor"
        replacement: "10.0.3.2:15353"
    static_configs:
      - targets:
          - "google.com"

  - job_name: "dnsexp_google_a_multi_resolver"
    scrape_interval: "10s"
    metrics_path: "/query"
    params:
      module:
        - "google_a_multi_resolver"
    relabel_configs:
      - source_labels: ["__address__"]
        target_label: "__param_server"
      - source_labels: ["__address__"]
        target_label: "instance"
      - target_label: "__address__"
        replacement: "10.0.3.2:15353"
      - target_label: "monitor"
        replacement: "10.0.3.2:15353"
    static_configs:
      - targets:
          - "1.0.0.1"
          - "1.1.1.1"
          - "205.171.2.65"
          - "205.171.3.65"
          - "208.67.220.220"
          - "208.67.222.222"
          - "75.75.75.75"
          - "75.75.76.76"
          - "8.8.4.4"
          - "8.8.8.8"

  - job_name: "dnsexp_internal"
    scrape_interval: "10s"
    metrics_path: "/metrics"
    relabel_configs:
      - target_label: "monitor"
        replacement: "10.0.3.2:15353"
    static_configs:
      - targets:
          - "10.0.3.2:15353"

  - job_name: "hv-lab"
    static_configs:
      - targets: ["10.0.3.6:9100"]

  - job_name: "lab_dir1"
    static_configs:
      - targets: ["10.0.3.11:9182"]

  - job_name: "lab_dir2"
    static_configs:
      - targets: ["10.0.3.12:9182"]

  - job_name: "lab_guacamole"
    static_configs:
      - targets: ["10.0.3.250:9100"]

  - job_name: "lab_k8s"
    honor_timestamps: true
    metrics_path: "/metrics"
    scheme: "http"
    static_configs:
      - targets: ["10.0.3.58:8080"]
    metric_relabel_configs:
      - target_label: "cluster"
        replacement: "k8s"

  - job_name: "lab_k8s-main"
    static_configs:
      - targets: ["10.0.3.40:9100"]

  - job_name: "lab_k8s-worker01"
    static_configs:
      - targets: ["10.0.3.41:9100"]

  - job_name: "lab_k8s-worker02"
    static_configs:
      - targets: ["10.0.3.42:9100"]

  - job_name: "lab_k8s-worker03"
    static_configs:
      - targets: ["10.0.3.43:9100"]

  - job_name: "pi"
    static_configs:
      - targets: ["10.0.3.2:9100"]

  - job_name: "pi_cadvisor"
    static_configs:
      - targets: ["10.0.3.2:9999"]

  - job_name: "pi_docker"
    static_configs:
      - targets: ["10.0.3.2:9323"]

  - job_name: "pihole_exporter"
    static_configs:
      - targets: ["10.0.3.2:9617"]

  - job_name: "pushgateway"
    honor_labels: true
    static_configs:
      - targets: ["10.0.3.2:9091"]

  - job_name: "snmp_synology"
    static_configs:
      - targets:
          - "10.0.3.254"
    metrics_path: "/snmp"
    params:
      module: ["synology"]
    relabel_configs:
      - source_labels: ["__address__"]
        target_label: "__param_target"
      - source_labels: ["__param_target"]
        target_label: "instance"
      - target_label: "__address__"
        replacement: "10.0.3.2:9116"

  - job_name: "snmp_unifi_rt1"
    static_configs:
      - targets:
          - "10.0.1.1"
    metrics_path: "/snmp"
    params:
      auth: ["public_v2"]
      module: ["if_mib", "ip_mib", "ubiquiti_unifi"]
    relabel_configs:
      - source_labels: ["__address__"]
        target_label: "__param_target"
      - source_labels: ["__param_target"]
        target_label: "instance"
      - target_label: "__address__"
        replacement: "10.0.3.2:9116"

  - job_name: "snmp_unifi_sw1"
    static_configs:
      - targets:
          - "10.0.1.2"
    metrics_path: "/snmp"
    params:
      auth: ["public_v2"]
      module: ["if_mib", "ip_mib", "ubiquiti_unifi"]
    relabel_configs:
      - source_labels: ["__address__"]
        target_label: "__param_target"
      - source_labels: ["__param_target"]
        target_label: "instance"
      - target_label: "__address__"
        replacement: "10.0.3.2:9116"

  - job_name: "snmp_unifi_ap1"
    static_configs:
      - targets:
          - "10.0.1.10"
    metrics_path: "/snmp"
    params:
      auth: ["public_v2"]
      module: ["if_mib", "ip_mib", "ubiquiti_unifi"]
    relabel_configs:
      - source_labels: ["__address__"]
        target_label: "__param_target"
      - source_labels: ["__param_target"]
        target_label: "instance"
      - target_label: "__address__"
        replacement: "10.0.3.2:9116"

  - job_name: "snmp_unifi_ap2"
    static_configs:
      - targets:
          - "10.0.1.11"
    metrics_path: "/snmp"
    params:
      auth: ["public_v2"]
      module: ["if_mib", "ip_mib", "ubiquiti_unifi"]
    relabel_configs:
      - source_labels: ["__address__"]
        target_label: "__param_target"
      - source_labels: ["__param_target"]
        target_label: "instance"
      - target_label: "__address__"
        replacement: "10.0.3.2:9116"

  - job_name: "unpoller"
    scrape_interval: "30s"
    static_configs:
      - targets:
          - "https://10.0.0.1"
    metrics_path: "/metrics"
    relabel_configs:
      - source_labels: ["__address__"]
        target_label: "__param_target"
      - source_labels: ["__param_target"]
        target_label: "instance"
      - target_label: "__address__"
        replacement: "10.0.3.2:9130"
