clients:
  - url: "http://127.0.0.1:3100/loki/api/v1/push"
positions:
  filename: "/tmp/positions.yaml"
scrape_configs:
  - job_name: "system"
    static_configs:
      - targets:
          - "localhost"
        labels:
          job: "varlogs"
          __path__: "/var/log/*log"
server:
  http_listen_port: 9080
  grpc_listen_port: 0
